services:
  - type: web
    name: toeic-mastery
    runtime: docker
    plan: free
    region: singapore # Change to your preferred region
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: SUPABASE_URL
        sync: false # Set in Render Dashboard
      - key: SUPABASE_KEY
        sync: false # Set in Render Dashboard
      - key: SUPABASE_BUCKET
        value: toeic-assets
      - key: STORAGE_MODE
        value: CLOUD
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
