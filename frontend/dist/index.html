<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Mastery — Luyện Thi Listening & Reading</title>
    <meta name="description" content="Ứng dụng luyện thi TOEIC 2 kỹ năng Listening & Reading với đề thi từ khóa học online.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Top Nav -->
        <header id="top-nav">
            <div class="nav-brand" onclick="router.navigate('/')">
                <span class="brand-icon">📚</span>
                <span class="brand-text">TOEIC <span class="brand-accent">Mastery</span></span>
            </div>
            <nav class="nav-links">
                <a href="#/" class="nav-link active" data-page="library">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Thư viện
                </a>
                <a href="#/flashcards" class="nav-link" data-page="flashcards">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H20v15.5A1.5 1.5 0 0 1 18.5 21H6.5A2.5 2.5 0 0 1 4 18.5v-12z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
                    Flashcards
                </a>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main id="page-content">
            <!-- Pages rendered here by router -->
        </main>

        <!-- Import Modal -->
        <div id="import-modal" class="modal-overlay hidden">
            <div class="modal-content glass-card">
                <div class="modal-header">
                    <h2>📥 Import Đề Thi</h2>
                    <button class="btn-icon" onclick="closeImportModal()">✕</button>
                </div>
                <form id="import-form" class="import-form">
                    <div class="form-group">
                        <label>Nguồn nội dung HTML <span class="required">*</span></label>
                        <div class="import-tabs">
                            <button type="button" class="import-tab active" data-tab="file" onclick="switchImportTab('file')">📁 Upload File</button>
                            <button type="button" class="import-tab" data-tab="paste" onclick="switchImportTab('paste')">📝 Paste HTML</button>
                        </div>

                        <!-- Tab: File Upload -->
                        <div class="file-drop-zone" id="html-drop-zone">
                            <input type="file" id="import-html" accept=".html,.htm,.txt">
                            <div class="drop-zone-content">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                <p>Kéo thả file HTML vào đây</p>
                                <span class="drop-zone-hint">hoặc click để chọn file</span>
                            </div>
                            <div class="drop-zone-file hidden">
                                <span class="file-name"></span>
                                <button type="button" class="btn-icon btn-sm" onclick="clearFile('html')">✕</button>
                            </div>
                        </div>

                        <!-- Tab: Paste HTML -->
                        <div id="html-paste-zone" class="hidden">
                            <textarea id="import-html-pasted" class="form-textarea" placeholder="Dán nội dung HTML từ course online vào đây..."></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="import-audio">File Audio (tuỳ chọn)</label>
                        <div class="file-drop-zone" id="audio-drop-zone">
                            <input type="file" id="import-audio" accept="audio/*">
                            <div class="drop-zone-content">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                <p>Kéo thả file audio vào đây</p>
                            </div>
                            <div class="drop-zone-file hidden">
                                <span class="file-name"></span>
                                <button type="button" class="btn-icon btn-sm" onclick="clearFile('audio')">✕</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="import-tags">Tags (phân cách bằng dấu phẩy)</label>
                        <input type="text" id="import-tags" placeholder="part1, listening, photos" class="form-input">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost" onclick="closeImportModal()">Huỷ</button>
                        <button type="submit" class="btn btn-primary" id="import-submit-btn">
                            <span class="btn-text">Import đề thi</span>
                            <span class="btn-loading hidden">
                                <span class="spinner"></span> Đang xử lý...
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Flashcard Modal -->
        <div id="flashcard-modal" class="modal-overlay hidden">
            <div class="modal-content glass-card">
                <div class="modal-header">
                    <div>
                        <h2 id="flashcard-modal-title">Thêm flashcard</h2>
                        <p id="flashcard-modal-meta" class="modal-subtitle"></p>
                    </div>
                    <button class="btn-icon" onclick="closeFlashcardModal()">✕</button>
                </div>
                <form id="flashcard-form" class="import-form">
                    <div class="form-group">
                        <label for="flashcard-term">Term <span class="required">*</span></label>
                        <input type="text" id="flashcard-term" class="form-input" placeholder="Từ hoặc cụm từ cần học" required>
                    </div>
                    <div class="form-group">
                        <label for="flashcard-meaning">Meaning</label>
                        <textarea id="flashcard-meaning" class="form-textarea" placeholder="Nghĩa hoặc ghi nhớ ngắn"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="flashcard-example">Example</label>
                        <textarea id="flashcard-example" class="form-textarea" placeholder="Ví dụ hoặc ngữ cảnh"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="flashcard-deck">Deck</label>
                        <input type="text" id="flashcard-deck" class="form-input" placeholder="Default">
                    </div>
                    <div class="form-group">
                        <label for="flashcard-tags">Tags (phân cách bằng dấu phẩy)</label>
                        <input type="text" id="flashcard-tags" class="form-input" placeholder="part1, mistake, vocab">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost" onclick="closeFlashcardModal()">Huỷ</button>
                        <button type="submit" class="btn btn-primary" id="flashcard-submit-btn">
                            <span id="flashcard-submit-text">Lưu flashcard</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Image Lightbox -->
        <div id="lightbox" class="lightbox-overlay hidden" onclick="closeLightbox()">
            <img id="lightbox-img" src="" alt="Preview">
            <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <script src="/static/api.js"></script>
    <script src="/static/router.js"></script>
    <script src="/static/pages/library.js"></script>
    <script src="/static/pages/attempt.js"></script>
    <script src="/static/pages/review.js"></script>
    <script src="/static/pages/flashcards.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
